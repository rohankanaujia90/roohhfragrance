<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Roohh Fragrances</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Custom Admin Styles -->
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- Login Section -->
  <section id="loginSection" class="admin-auth-section">
    <div class="login-container">
      <div class="login-header">
        <img src="images/logo.png" alt="Roohh Logo" class="admin-logo">
        <h2>Admin Login</h2>
        <p>Enter your credentials to manage Roohh Fragrances.</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Admin Email</label>
          <input type="email" id="email" placeholder="email@example.com" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="admin-btn primary">Login</button>
        <div id="loginError" class="error-msg hidden">Invalid credentials. Access denied.</div>
      </form>
    </div>
  </section>

  <!-- Dashboard Section -->
  <main id="dashboardSection" class="admin-dashboard hidden">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <img src="images/logo.png" alt="Roohh Logo" class="admin-logo">
        <span class="admin-tag">Admin Panel</span>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="active"><i class="fa-solid fa-gem"></i> Products</a>
        <a href="index.html"><i class="fa-solid fa-house"></i> View Site</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logoutBtn" class="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
      </div>
    </aside>

    <div class="admin-content">
      <header class="content-header">
        <div class="header-info">
          <h1>Product Management</h1>
          <p>Add, edit or remove products from the storefront.</p>
        </div>
        <button id="addProductBtn" class="admin-btn primary"><i class="fa-solid fa-plus"></i> Add Product</button>
      </header>

      <section class="products-table-section">
        <div class="table-container">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Rating</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="productsTableBody">
              <!-- JS will populate this -->
            </tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <!-- Modal for Adding/Editing Product -->
  <div id="productModal" class="admin-modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add New Product</h2>
        <button class="close-modal"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <form id="productForm">
        <input type="hidden" id="productId">
        <div class="form-row">
          <div class="form-group">
            <label for="pName">Product Name</label>
            <input type="text" id="pName" required>
          </div>
          <div class="form-group">
            <label for="pCategory">Category</label>
            <select id="pCategory">
              <option value="oriental">Oriental</option>
              <option value="floral">Floral</option>
              <option value="woody">Woody</option>
              <option value="fresh">Fresh</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="pPrice">Price (₹)</label>
            <input type="number" id="pPrice" required>
          </div>
          <div class="form-group">
            <label for="pSize">Default Size</label>
            <input type="text" id="pSize" placeholder="50ml" required>
          </div>
        </div>
        <div class="form-group">
          <label for="pImage">Image URL (e.g., images/product_oud_mystique.png)</label>
          <input type="text" id="pImage" required>
        </div>
        <div class="form-group">
          <label for="pDesc">Description</label>
          <textarea id="pDesc" rows="3" required></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="pTop">Top Notes</label>
            <input type="text" id="pTop">
          </div>
          <div class="form-group">
            <label for="pHeart">Heart Notes</label>
            <input type="text" id="pHeart">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="pBase">Base Notes</label>
            <input type="text" id="pBase">
          </div>
          <div class="form-group chk-group">
            <label>
              <input type="checkbox" id="pBestseller"> Mark as Bestseller
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="admin-btn secondary close-modal">Cancel</button>
          <button type="submit" class="admin-btn primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="adminToast" class="admin-toast"></div>

  <!-- Scripts -->
  <script src="admin.js"></script>
</body>
</html>
